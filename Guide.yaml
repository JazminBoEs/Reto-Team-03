openapi: 3.0.0
info:
  title: API de Sistema Agrícola
  description: >
    API REST generada para la gestión integral de recursos agrícolas,
    incluyendo usuarios, predios, áreas de riego, sensores y mediciones históricas.
  version: 1.0.0
  contact:
    name: Soporte de Arquitectura
    email: arquitectura@ejemplo.com
    url: https://ejemplo.com/soporte
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor de Desarrollo

tags:
  - name: Usuario
  - name: Predio
  - name: Usuario_predio
  - name: RegistroAuditoria
  - name: ModuloControl
  - name: AreaRiego
  - name: Sensor
  - name: ConfiguracionCultivo
  - name: Alerta
  - name: MedicionHistorica

paths:
  # ==========================================
  # /usuarios
  # ==========================================
  /usuarios:
    get:
      tags: [Usuario]
      summary: Obtener todos los usuarios
      description: Retorna una lista completa de todos los usuarios registrados en el sistema.
      operationId: getUsuarios
      responses:
        '200':
          description: Lista de usuarios obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Usuario]
      summary: Crear un usuario
      description: Crea un nuevo registro de usuario en la base de datos.
      operationId: createUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '201':
          description: Usuario creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /usuarios/{id}:
    get:
      tags: [Usuario]
      summary: Obtener un usuario por ID
      description: Retorna los detalles de un usuario específico basado en su ID.
      operationId: getUsuarioById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Usuario encontrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [Usuario]
      summary: Actualizar un usuario
      description: Actualiza la información de un usuario existente.
      operationId: updateUsuario
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '200':
          description: Usuario actualizado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [Usuario]
      summary: Eliminar un usuario
      description: Elimina lógicamente o físicamente un usuario del sistema.
      operationId: deleteUsuario
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Usuario eliminado exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /predios
  # ==========================================
  /predios:
    get:
      tags: [Predio]
      summary: Obtener todos los predios
      description: Retorna una lista de todos los predios agrícolas registrados.
      operationId: getPredios
      responses:
        '200':
          description: Lista de predios obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Predio'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Predio]
      summary: Crear un predio
      description: Registra un nuevo predio en el sistema.
      operationId: createPredio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredioInput'
      responses:
        '201':
          description: Predio creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Predio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /predios/{id}:
    get:
      tags: [Predio]
      summary: Obtener un predio por ID
      description: Retorna la información de un predio específico.
      operationId: getPredioById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Predio encontrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Predio'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [Predio]
      summary: Actualizar un predio
      description: Actualiza los datos de un predio existente.
      operationId: updatePredio
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredioInput'
      responses:
        '200':
          description: Predio actualizado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Predio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [Predio]
      summary: Eliminar un predio
      description: Elimina un predio específico del sistema.
      operationId: deletePredio
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Predio eliminado exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /usuarios-predios
  # ==========================================
  /usuarios-predios:
    get:
      tags: [Usuario_predio]
      summary: Obtener todas las asignaciones usuario-predio
      description: Retorna la lista de relaciones entre usuarios y predios con sus respectivos roles.
      operationId: getUsuariosPredios
      responses:
        '200':
          description: Lista de asignaciones obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario_predio'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Usuario_predio]
      summary: Crear asignación usuario-predio
      description: Asigna un usuario a un predio con un rol específico.
      operationId: createUsuarioPredio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Usuario_predioInput'
      responses:
        '201':
          description: Asignación creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario_predio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /usuarios-predios/{id}:
    get:
      tags: [Usuario_predio]
      summary: Obtener asignación usuario-predio
      description: Retorna los detalles de una asignación específica usando un ID compuesto.
      operationId: getUsuarioPredioById
      parameters:
        - $ref: '#/components/parameters/IdParamString'
      responses:
        '200':
          description: Asignación encontrada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario_predio'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [Usuario_predio]
      summary: Actualizar asignación
      description: Actualiza el rol u otros datos de una asignación usuario-predio.
      operationId: updateUsuarioPredio
      parameters:
        - $ref: '#/components/parameters/IdParamString'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Usuario_predioInput'
      responses:
        '200':
          description: Asignación actualizada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario_predio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [Usuario_predio]
      summary: Eliminar asignación
      description: Remueve la asignación de un usuario a un predio.
      operationId: deleteUsuarioPredio
      parameters:
        - $ref: '#/components/parameters/IdParamString'
      responses:
        '204':
          description: Asignación eliminada exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /registros-auditoria
  # ==========================================
  /registros-auditoria:
    get:
      tags: [RegistroAuditoria]
      summary: Obtener auditorías
      description: Retorna el historial de registros de auditoría del sistema.
      operationId: getRegistrosAuditoria
      responses:
        '200':
          description: Lista de registros obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistroAuditoria'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [RegistroAuditoria]
      summary: Crear registro de auditoría
      description: Inserta un nuevo evento en el registro de auditoría.
      operationId: createRegistroAuditoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroAuditoriaInput'
      responses:
        '201':
          description: Registro de auditoría creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroAuditoria'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /registros-auditoria/{id}:
    get:
      tags: [RegistroAuditoria]
      summary: Obtener auditoría por ID
      description: Retorna un registro de auditoría específico.
      operationId: getRegistroAuditoriaById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Registro encontrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroAuditoria'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [RegistroAuditoria]
      summary: Actualizar registro auditoría
      description: Modifica un registro de auditoría (uso administrativo).
      operationId: updateRegistroAuditoria
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroAuditoriaInput'
      responses:
        '200':
          description: Registro actualizado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroAuditoria'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [RegistroAuditoria]
      summary: Eliminar registro auditoría
      description: Elimina un registro de auditoría del sistema.
      operationId: deleteRegistroAuditoria
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Registro eliminado exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /modulos-control
  # ==========================================
  /modulos-control:
    get:
      tags: [ModuloControl]
      summary: Obtener módulos de control
      description: Retorna la lista de todos los módulos de control (hardware).
      operationId: getModulosControl
      responses:
        '200':
          description: Lista de módulos obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuloControl'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [ModuloControl]
      summary: Crear módulo
      description: Registra un nuevo módulo de control en el sistema.
      operationId: createModuloControl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuloControlInput'
      responses:
        '201':
          description: Módulo de control creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuloControl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /modulos-control/{id}:
    get:
      tags: [ModuloControl]
      summary: Obtener módulo por ID
      description: Obtiene la información detallada de un módulo específico.
      operationId: getModuloControlById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Módulo encontrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuloControl'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [ModuloControl]
      summary: Actualizar módulo
      description: Actualiza los datos de un módulo de control.
      operationId: updateModuloControl
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuloControlInput'
      responses:
        '200':
          description: Módulo actualizado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuloControl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [ModuloControl]
      summary: Eliminar módulo
      description: Desactiva o elimina un módulo de control de la base de datos.
      operationId: deleteModuloControl
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Módulo eliminado exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /areas-riego
  # ==========================================
  /areas-riego:
    get:
      tags: [AreaRiego]
      summary: Obtener áreas de riego
      description: Retorna una lista con todas las áreas de riego configuradas.
      operationId: getAreasRiego
      responses:
        '200':
          description: Lista de áreas obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AreaRiego'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [AreaRiego]
      summary: Crear área de riego
      description: Crea una nueva área de riego asociada a un predio.
      operationId: createAreaRiego
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRiegoInput'
      responses:
        '201':
          description: Área de riego creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiego'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /areas-riego/{id}:
    get:
      tags: [AreaRiego]
      summary: Obtener área de riego por ID
      description: Busca y retorna la información de un área de riego específica.
      operationId: getAreaRiegoById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Área encontrada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiego'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [AreaRiego]
      summary: Actualizar área de riego
      description: Modifica los parámetros de un área de riego existente.
      operationId: updateAreaRiego
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRiegoInput'
      responses:
        '200':
          description: Área de riego actualizada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiego'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [AreaRiego]
      summary: Eliminar área de riego
      description: Remueve un área de riego del sistema.
      operationId: deleteAreaRiego
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Área eliminada exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /sensores
  # ==========================================
  /sensores:
    get:
      tags: [Sensor]
      summary: Obtener sensores
      description: Retorna una lista con todos los sensores registrados.
      operationId: getSensores
      responses:
        '200':
          description: Lista de sensores obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sensor'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Sensor]
      summary: Crear sensor
      description: Registra un nuevo sensor asociándolo a un módulo y área.
      operationId: createSensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorInput'
      responses:
        '201':
          description: Sensor creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /sensores/{id}:
    get:
      tags: [Sensor]
      summary: Obtener sensor por ID
      description: Retorna los datos y estado de un sensor específico.
      operationId: getSensorById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Sensor encontrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [Sensor]
      summary: Actualizar sensor
      description: Actualiza los niveles de batería, señal u otra información del sensor.
      operationId: updateSensor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorInput'
      responses:
        '200':
          description: Sensor actualizado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [Sensor]
      summary: Eliminar sensor
      description: Da de baja a un sensor en el sistema.
      operationId: deleteSensor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Sensor eliminado exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /configuraciones-cultivos
  # ==========================================
  /configuraciones-cultivos:
    get:
      tags: [ConfiguracionCultivo]
      summary: Obtener configuraciones de cultivos
      description: Retorna la lista de todas las configuraciones agronómicas guardadas.
      operationId: getConfiguracionesCultivos
      responses:
        '200':
          description: Configuraciones obtenidas exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfiguracionCultivo'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [ConfiguracionCultivo]
      summary: Crear configuración
      description: Registra una nueva configuración de cultivo para un área específica.
      operationId: createConfiguracionCultivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfiguracionCultivoInput'
      responses:
        '201':
          description: Configuración creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfiguracionCultivo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /configuraciones-cultivos/{id}:
    get:
      tags: [ConfiguracionCultivo]
      summary: Obtener configuración por ID
      description: Obtiene los detalles de una configuración de cultivo en particular.
      operationId: getConfiguracionCultivoById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Configuración encontrada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfiguracionCultivo'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [ConfiguracionCultivo]
      summary: Actualizar configuración
      description: Modifica los parámetros de una configuración de cultivo.
      operationId: updateConfiguracionCultivo
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfiguracionCultivoInput'
      responses:
        '200':
          description: Configuración actualizada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfiguracionCultivo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [ConfiguracionCultivo]
      summary: Eliminar configuración
      description: Borra una configuración de cultivo del sistema.
      operationId: deleteConfiguracionCultivo
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Configuración eliminada exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # /alertas
  # ==========================================
  /alertas:
    get:
      tags: [Alerta]
      summary: Obtener alertas
      description: Retorna la lista de alertas generadas en el sistema.
      operationId: getAlertas
      responses:
        '200':
          description: Lista de alertas obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alerta'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Alerta]
      summary: Crear alerta
      description: Genera una nueva alerta manual o automática para un área y usuario.
      operationId: createAlerta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertaInput'
      responses:
        '201':
          description: Alerta generada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alerta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /alertas/{id}:
    get:
      tags: [Alerta]
      summary: Obtener alerta por ID
      description: Busca y retorna el detalle de una alerta específica.
      operationId: getAlertaById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Alerta encontrada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alerta'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [Alerta]
      summary: Actualizar alerta
      description: Modifica el estado de una alerta (ej. marcarla como leída).
      operationId: updateAlerta
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertaInput'
      responses:
        '200':
          description: Alerta actualizada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alerta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [Alerta]
      summary: Eliminar alerta
      description: Elimina un registro de alerta del historial.
      operationId: deleteAlerta
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Alerta eliminada exitosamente (Sin contenido de respuesta).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

