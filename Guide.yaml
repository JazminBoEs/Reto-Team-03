openapi: 3.0.0
info:
  title: IrriGo API
  version: 1.0.0
  description: Especificación OpenAPI para el sistema de riego agrícola IrriGo.
  contact:
    name: Soporte IrriGo
    email: soporte@irrigo.com
servers:
  - url: http://localhost:3000/api/v1
tags:
  - name: Usuarios
    description: Operaciones relacionadas con los usuarios del sistema
  - name: Predios
    description: Operaciones sobre los predios agrícolas
  - name: UsuariosPredios
    description: Asignaciones de administración entre usuarios y predios
  - name: ModulosControl
    description: Gestión de los módulos de control hardware
  - name: AreasRiego
    description: Gestión de las diferentes áreas o parcelas de riego
  - name: Sensores
    description: Registro y lectura de sensores de campo
  - name: ConfiguracionesCultivo
    description: Parámetros y umbrales de riego por cultivo
  - name: MedicionesHistoricas
    description: Historial de datos climáticos y del suelo
  - name: Alertas
    description: Sistema de notificaciones y alertas
  - name: RegistrosAuditoria
    description: Bitácora de cambios y acciones de los usuarios
paths:
  /usuarios:
    get:
      summary: Obtener lista de usuarios
      description: Retorna una lista paginada de todos los usuarios registrados en el sistema.
      operationId: getUsuarios
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de usuarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear nuevo usuario
      description: Crea un nuevo usuario en la base de datos con sus credenciales básicas.
      operationId: crearUsuario
      tags: [Usuarios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /usuarios/{idUsuario}:
    get:
      summary: Obtener usuario por ID
      description: Obtiene los detalles de un usuario específico mediante su identificador único.
      operationId: getUsuarioById
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/PathIdUsuario'
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar usuario
      description: Actualiza los datos personales y de contacto de un usuario existente.
      operationId: actualizarUsuario
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/PathIdUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar usuario
      description: Elimina un usuario del sistema permanentemente.
      operationId: eliminarUsuario
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/PathIdUsuario'
      responses:
        '204':
          description: Usuario eliminado exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /usuarios/login:
    post:
      summary: Autenticación básica de usuario
      description: Valida el correo y contraseña, retornando los datos del usuario omitiendo la contraseña.
      operationId: loginUsuario
      tags: [Usuarios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /predios:
    get:
      summary: Obtener lista de predios
      description: Devuelve una lista paginada de todos los predios agrícolas registrados.
      operationId: getPredios
      tags: [Predios]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de predios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Predio'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear nuevo predio
      description: Registra un nuevo predio con su ubicación geográfica.
      operationId: crearPredio
      tags: [Predios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredioInput'
      responses:
        '201':
          description: Predio creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Predio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /predios/{idPredio}:
    get:
      summary: Obtener predio por ID
      description: Recupera la información detallada de un predio según su ID.
      operationId: getPredioById
      tags: [Predios]
      parameters:
        - $ref: '#/components/parameters/PathIdPredio'
      responses:
        '200':
          description: Predio encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Predio'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar predio
      description: Modifica el nombre o coordenadas de un predio existente.
      operationId: actualizarPredio
      tags: [Predios]
      parameters:
        - $ref: '#/components/parameters/PathIdPredio'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredioInput'
      responses:
        '200':
          description: Predio actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Predio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar predio
      description: Borra un predio del sistema de manera definitiva.
      operationId: eliminarPredio
      tags: [Predios]
      parameters:
        - $ref: '#/components/parameters/PathIdPredio'
      responses:
        '204':
          description: Predio eliminado exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /usuarios-predios:
    get:
      summary: Obtener asignaciones de usuarios a predios
      description: Retorna la relación de qué usuarios tienen acceso o administración sobre qué predios.
      operationId: getUsuariosPredios
      tags: [UsuariosPredios]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/QueryIdUsuario'
        - $ref: '#/components/parameters/QueryIdPredio'
      responses:
        '200':
          description: Asignaciones obtenidas exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioPredio'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Asignar usuario a predio
      description: Crea un vínculo M:N asignando un usuario a un predio específico, indicando si es administrador.
      operationId: asignarUsuarioPredio
      tags: [UsuariosPredios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioPredioInput'
      responses:
        '201':
          description: Asignación creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioPredio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /usuarios-predios/{idUsuario}/{idPredio}:
    get:
      summary: Obtener asignación específica
      description: Recupera el detalle de una asignación concreta entre un usuario y un predio.
      operationId: getUsuarioPredioByIds
      tags: [UsuariosPredios]
      parameters:
        - $ref: '#/components/parameters/PathIdUsuario'
        - $ref: '#/components/parameters/PathIdPredio'
      responses:
        '200':
          description: Asignación encontrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioPredio'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar asignación
      description: Modifica los permisos (por ejemplo, el flag Admin) de una asignación existente.
      operationId: actualizarUsuarioPredio
      tags: [UsuariosPredios]
      parameters:
        - $ref: '#/components/parameters/PathIdUsuario'
        - $ref: '#/components/parameters/PathIdPredio'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioPredioUpdateInput'
      responses:
        '200':
          description: Asignación actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioPredio'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar asignación
      description: Desvincula un usuario de un predio, removiendo su acceso.
      operationId: eliminarUsuarioPredio
      tags: [UsuariosPredios]
      parameters:
        - $ref: '#/components/parameters/PathIdUsuario'
        - $ref: '#/components/parameters/PathIdPredio'
      responses:
        '204':
          description: Asignación eliminada exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /modulos-control:
    get:
      summary: Obtener módulos de control
      description: Retorna una lista de todos los módulos controladores de hardware.
      operationId: getModulosControl
      tags: [ModulosControl]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de módulos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuloControl'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear módulo de control
      description: Da de alta un nuevo módulo de control indicando su identificador de red.
      operationId: crearModuloControl
      tags: [ModulosControl]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuloControlInput'
      responses:
        '201':
          description: Módulo creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuloControl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /modulos-control/{idModulo}:
    get:
      summary: Obtener módulo por ID
      description: Recupera la información de un módulo controlador específico por su ID.
      operationId: getModuloControlById
      tags: [ModulosControl]
      parameters:
        - $ref: '#/components/parameters/PathIdModulo'
      responses:
        '200':
          description: Módulo encontrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuloControl'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar módulo
      description: Actualiza los detalles de un módulo, como su nombre o estado activo/inactivo.
      operationId: actualizarModuloControl
      tags: [ModulosControl]
      parameters:
        - $ref: '#/components/parameters/PathIdModulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuloControlInput'
      responses:
        '200':
          description: Módulo actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuloControl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar módulo
      description: Elimina un módulo de control de la base de datos.
      operationId: eliminarModuloControl
      tags: [ModulosControl]
      parameters:
        - $ref: '#/components/parameters/PathIdModulo'
      responses:
        '204':
          description: Módulo eliminado exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /areas-riego:
    get:
      summary: Obtener áreas de riego
      description: Devuelve las diferentes áreas o parcelas de riego, filtrables por predio o módulo.
      operationId: getAreasRiego
      tags: [AreasRiego]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/QueryIdPredio'
        - $ref: '#/components/parameters/QueryIdModulo'
      responses:
        '200':
          description: Lista de áreas de riego obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AreaRiego'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear área de riego
      description: Registra una nueva parcela o área de riego perteneciente a un predio.
      operationId: crearAreaRiego
      tags: [AreasRiego]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRiegoInput'
      responses:
        '201':
          description: Área de riego creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiego'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /areas-riego/{idArea}:
    get:
      summary: Obtener área de riego por ID
      description: Busca y retorna la información de una parcela de riego específica.
      operationId: getAreaRiegoById
      tags: [AreasRiego]
      parameters:
        - $ref: '#/components/parameters/PathIdArea'
      responses:
        '200':
          description: Área de riego encontrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiego'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar área de riego
      description: Modifica los parámetros de un área, como su tamaño en hectáreas o su estado.
      operationId: actualizarAreaRiego
      tags: [AreasRiego]
      parameters:
        - $ref: '#/components/parameters/PathIdArea'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRiegoInput'
      responses:
        '200':
          description: Área de riego actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiego'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar área de riego
      description: Elimina una parcela de la base de datos.
      operationId: eliminarAreaRiego
      tags: [AreasRiego]
      parameters:
        - $ref: '#/components/parameters/PathIdArea'
      responses:
        '204':
          description: Área de riego eliminada exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /sensores:
    get:
      summary: Obtener sensores
      description: Retorna la lista de sensores desplegados, filtrables por módulo o área.
      operationId: getSensores
      tags: [Sensores]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/QueryIdModulo'
        - $ref: '#/components/parameters/QueryIdArea'
      responses:
        '200':
          description: Lista de sensores obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sensor'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear sensor
      description: Da de alta un nuevo sensor físico indicando su posición, batería y señal inicial.
      operationId: crearSensor
      tags: [Sensores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorInput'
      responses:
        '201':
          description: Sensor creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /sensores/{idSensor}:
    get:
      summary: Obtener sensor por ID
      description: Recupera la información estática y de estado actual de un sensor específico.
      operationId: getSensorById
      tags: [Sensores]
      parameters:
        - $ref: '#/components/parameters/PathIdSensor'
      responses:
        '200':
          description: Sensor encontrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar sensor
      description: Actualiza la lectura de la batería, señal o ubicación de un sensor.
      operationId: actualizarSensor
      tags: [Sensores]
      parameters:
        - $ref: '#/components/parameters/PathIdSensor'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorInput'
      responses:
        '200':
          description: Sensor actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar sensor
      description: Elimina el registro de un dispositivo sensor.
      operationId: eliminarSensor
      tags: [Sensores]
      parameters:
        - $ref: '#/components/parameters/PathIdSensor'
      responses:
        '204':
          description: Sensor eliminado exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /configuraciones-cultivo:
    get:
      summary: Obtener configuraciones de cultivo
      description: Devuelve los perfiles de configuración agronómica definidos para las áreas.
      operationId: getConfiguracionesCultivo
      tags: [ConfiguracionesCultivo]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/QueryIdArea'
      responses:
        '200':
          description: Lista de configuraciones obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfiguracionCultivo'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear configuración
      description: Establece los umbrales ideales de humedad, lámina de riego y tipo de tierra para un área.
      operationId: crearConfiguracionCultivo
      tags: [ConfiguracionesCultivo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfiguracionCultivoInput'
      responses:
        '201':
          description: Configuración creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfiguracionCultivo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /configuraciones-cultivo/{idConfiguracion}:
    get:
      summary: Obtener configuración por ID
      description: Lee los parámetros hídricos configurados para un identificador específico.
      operationId: getConfiguracionCultivoById
      tags: [ConfiguracionesCultivo]
      parameters:
        - $ref: '#/components/parameters/PathIdConfiguracion'
      responses:
        '200':
          description: Configuración encontrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfiguracionCultivo'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar configuración
      description: Modifica los umbrales de rango de humedad y capacidad de campo de un área.
      operationId: actualizarConfiguracionCultivo
      tags: [ConfiguracionesCultivo]
      parameters:
        - $ref: '#/components/parameters/PathIdConfiguracion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfiguracionCultivoInput'
      responses:
        '200':
          description: Configuración actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfiguracionCultivo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Eliminar configuración
      description: Borra la configuración de cultivo asociada a un área.
      operationId: eliminarConfiguracionCultivo
      tags: [ConfiguracionesCultivo]
      parameters:
        - $ref: '#/components/parameters/PathIdConfiguracion'
      responses:
        '204':
          description: Configuración eliminada exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /mediciones-historicas:
    get:
      summary: Obtener mediciones
      description: Retorna el histórico de telemetría recopilado (humedad, temperatura, viento, radiación).
