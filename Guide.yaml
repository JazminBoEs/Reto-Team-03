components:
  parameters:
    Limit:
      name: limit
      in: query
      description: Número máximo de registros a retornar
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      description: Número de registros a omitir
      schema:
        type: integer
        default: 0
    QueryIdPredio:
      name: idPredio
      in: query
      description: ID del predio para filtrar
      schema:
        type: integer
    QueryIdUsuario:
      name: idUsuario
      in: query
      description: ID del usuario para filtrar
      schema:
        type: integer
    QueryIdModulo:
      name: id_Modulo
      in: query
      description: ID del módulo para filtrar
      schema:
        type: integer
    QueryIdArea:
      name: id_Area
      in: query
      description: ID del área de riego para filtrar
      schema:
        type: integer
    PathIdUsuario:
      name: idUsuario
      in: path
      required: true
      description: ID del usuario
      schema:
        type: integer
    PathIdPredio:
      name: idPredio
      in: path
      required: true
      description: ID del predio
      schema:
        type: integer
    PathIdModulo:
      name: idModulo
      in: path
      required: true
      description: ID del módulo de control
      schema:
        type: integer
    PathIdArea:
      name: idArea
      in: path
      required: true
      description: ID del área de riego
      schema:
        type: integer
    PathIdSensor:
      name: idSensor
      in: path
      required: true
      description: ID del sensor
      schema:
        type: integer
    PathIdConfiguracion:
      name: idConfiguracion
      in: path
      required: true
      description: ID de la configuración de cultivo
      schema:
        type: integer
    PathIdMedicion:
      name: idMedicion
      in: path
      required: true
      description: ID de la medición histórica
      schema:
        type: integer
    PathIdAlerta:
      name: idAlerta
      in: path
      required: true
      description: ID de la alerta
      schema:
        type: integer
    PathIdRegistro:
      name: idRegistro
      in: path
      required: true
      description: ID del registro de auditoría
      schema:
        type: integer
  responses:
    BadRequest:
      description: Solicitud incorrecta o parámetros inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No autorizado, credenciales inválidas
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: El recurso solicitado no fue encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Parámetros de entrada inválidos"
    UsuarioResponse:
      type: object
      properties:
        IDusuario:
          type: integer
          example: 1
        Nombre:
          type: string
          maxLength: 100
          example: "Admin"
        Apellido:
          type: string
          maxLength: 100
          example: "Pérez"
        Email:
          type: string
          maxLength: 150
          example: "admin@irrigo.com"
        Telefono:
          type: string
          maxLength: 20
          example: "1234567890"
    UsuarioInput:
      type: object
