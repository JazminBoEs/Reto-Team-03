components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Identificador numérico único del recurso.
      schema:
        type: integer
    IdParamString:
      name: id
      in: path
      required: true
      description: Identificador compuesto del recurso (ej. '1-2' para IDs relacionados).
      schema:
        type: string

  responses:
    BadRequest:
      description: Petición inválida. El cuerpo de la solicitud no cumple con el esquema esperado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso no encontrado. El ID proporcionado no existe en el sistema.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Error interno del servidor al procesar la solicitud.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ------------------ Global Error ------------------
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "404"
        message:
          type: string
          example: "Recurso no encontrado"

    # ------------------ Usuario ------------------
    Usuario:
      type: object
      properties:
        IDusuario:
          type: integer
        Nombre:
          type: string
        Apellido:
          type: string
        Email:
          type: string
        Contraseña:
          type: string
        Teléfono:
          type: string
      example:
        IDusuario: 1
        Nombre: "Juan"
        Apellido: "Pérez"
        Email: "juan.perez@email.com"
        Contraseña: "hashed_password_123"
        Teléfono: "555-1234"

    UsuarioInput:
      type: object
      required: [Nombre, Email, Contraseña]
      properties:
        Nombre:
          type: string
        Apellido:
          type: string
        Email:
          type: string
        Contraseña:
          type: string
        Teléfono:
          type: string
      example:
        Nombre: "Juan"
        Apellido: "Pérez"
        Email: "juan.perez@email.com"
        Contraseña: "hashed_password_123"
        Teléfono: "555-1234"

    # ------------------ Predio ------------------
    Predio:
      type: object
      properties:
        IDpredio:
          type: integer
        NombrePredio:
          type: string
        Ubicación:
          type: string
        FechaCreación:
          type: string
          format: date-time
      example:
        IDpredio: 10
        NombrePredio: "Finca El Sol"
        Ubicación: "Valle Central, Sector 4"
        FechaCreación: "2023-10-01T14:30:00Z"

    PredioInput:
      type: object
      required: [NombrePredio]
      properties:
        NombrePredio:
          type: string
        Ubicación:
          type: string
      example:
        NombrePredio: "Finca El Sol"
        Ubicación: "Valle Central, Sector 4"

    # ------------------ Usuario_predio ------------------
    Usuario_predio:
      type: object
      properties:
        IDusuario:
          type: integer
        IDpredio:
          type: integer
        Rol:
          type: string
        Fecha_Asignacion:
          type: string
          format: date-time
      example:
        IDusuario: 1
        IDpredio: 10
        Rol: "Administrador"
        Fecha_Asignacion: "2023-10-05T09:15:00Z"

    Usuario_predioInput:
      type: object
      required: [Rol]
      properties:
        IDusuario:
          type: integer
        IDpredio:
          type: integer
        Rol:
          type: string
      example:
        IDusuario: 1
        IDpredio: 10
        Rol: "Administrador"

    # ------------------ RegistroAuditoria ------------------
    RegistroAuditoria:
      type: object
      properties:
        IDregistro:
          type: integer
        IDusuario:
          type: integer
        ID_Area:
          type: integer
        Fecha_Modificacion:
          type: string
          format: date-time
        Dato_Modificado:
          type: string
      example:
        IDregistro: 501
        IDusuario: 1
        ID_Area: 3
        Fecha_Modificacion: "2023-11-12T16:45:00Z"
        Dato_Modificado: "{ \"humedad_min\": 30 }"

    RegistroAuditoriaInput:
      type: object
      properties:
        IDusuario:
          type: integer
        ID_Area:
          type: integer
        Dato_Modificado:
          type: string
      example:
        IDusuario: 1
        ID_Area: 3
        Dato_Modificado: "{ \"humedad_min\": 30 }"

    # ------------------ ModuloControl ------------------
    ModuloControl:
      type: object
      properties:
        ID_Modulo:
          type: integer
        Nombre:
          type: string
        IdentificadorRed:
          type: string
        Estado:
          type: boolean
        UltimaConexion:
          type: string
          format: date-time
        Ultima_Actualizacion:
          type: string
          format: date-time
      example:
        ID_Modulo: 8
        Nombre: "Nodo Central Bomba"
        IdentificadorRed: "MAC-00:11:22:33:44"
        Estado: true
        UltimaConexion: "2023-11-20T08:00:00Z"
        Ultima_Actualizacion: "2023-11-20T08:00:00Z"

    ModuloControlInput:
      type: object
      properties:
        Nombre:
          type: string
        IdentificadorRed:
          type: string
        UltimaConexion:
          type: string
          format: date-time
        Ultima_Actualizacion:
          type: string
          format: date-time
      example:
        Nombre: "Nodo Central Bomba"
        IdentificadorRed: "MAC-00:11:22:33:44"
        UltimaConexion: "2023-11-20T08:00:00Z"
        Ultima_Actualizacion: "2023-11-20T08:00:00Z"

    # ------------------ AreaRiego ------------------
    AreaRiego:
      type: object
      properties:
        ID_Area:
          type: integer
        IDpredio:
          type: integer
        ID_Modulo:
          type: integer
        Nombre:
          type: string
        Num_Hectareas:
          type: number
          format: float
        Estado:
          type: boolean
      example:
        ID_Area: 3
        IDpredio: 10
        ID_Modulo: 8
        Nombre: "Sector Norte - Maíz"
        Num_Hectareas: 15.5
        Estado: true

    AreaRiegoInput:
      type: object
      properties:
        IDpredio:
          type: integer
        ID_Modulo:
          type: integer
        Nombre:
          type: string
        Num_Hectareas:
          type: number
          format: float
      example:
        IDpredio: 10
        ID_Modulo: 8
        Nombre: "Sector Norte - Maíz"
        Num_Hectareas: 15.5

    # ------------------ Sensor ------------------
    Sensor:
      type: object
      properties:
        IDsensor:
          type: integer
        ID_Modulo:
          type: integer
        ID_Area:
          type: integer
        Bateria:
          type: number
          format: float
        Señal:
          type: number
          format: float
      example:
        IDsensor: 102
        ID_Modulo: 8
        ID_Area: 3
        Bateria: 85.5
        Señal: -65.0

    SensorInput:
      type: object
      properties:
        ID_Modulo:
          type: integer
        ID_Area:
          type: integer
        Bateria:
          type: number
          format: float
        Señal:
          type: number
          format: float
      example:
        ID_Modulo: 8
        ID_Area: 3
        Bateria: 85.5
        Señal: -65.0

    # ------------------ ConfiguracionCultivo ------------------
    ConfiguracionCultivo:
      type: object
      properties:
        ID_Configuracion:
          type: integer
        ID_Area:
          type: integer
        TipoCultivo:
          type: string
        TipoTierra:
          type: string
        CapacidadCampo:
          type: number
          format: float
        PuntoMarchitez:
          type: number
          format: float
        RangoHumedadMIN:
          type: number
          format: float
        RangoHumedadMAX:
          type: number
          format: float
        LaminaRiego:
          type: number
          format: float
        DesarrolloVegetativo:
          type: number
          format: float
      example:
        ID_Configuracion: 1
        ID_Area: 3
        TipoCultivo: "Maíz Blanco"
        TipoTierra: "Franco Arcilloso"
        CapacidadCampo: 32.0
        PuntoMarchitez: 15.0
        RangoHumedadMIN: 20.0
        RangoHumedadMAX: 28.0
        LaminaRiego: 12.5
        DesarrolloVegetativo: 45.0

    ConfiguracionCultivoInput:
      type: object
      properties:
        ID_Area:
          type: integer
        TipoCultivo:
          type: string
        TipoTierra:
          type: string
        CapacidadCampo:
          type: number
          format: float
        PuntoMarchitez:
          type: number
          format: float
        RangoHumedadMIN:
          type: number
          format: float
        RangoHumedadMAX:
          type: number
          format: float
        LaminaRiego:
          type: number
          format: float
        DesarrolloVegetativo:
          type: number
          format: float
      example:
        ID_Area: 3
        TipoCultivo: "Maíz Blanco"
        TipoTierra: "Franco Arcilloso"
        CapacidadCampo: 32.0
        PuntoMarchitez: 15.0
        RangoHumedadMIN: 20.0
        RangoHumedadMAX: 28.0
        LaminaRiego: 12.5
        DesarrolloVegetativo: 45.0

    # ------------------ Alerta ------------------
    Alerta:
      type: object
      properties:
        ID_Alerta:
          type: integer
        ID_area:
          type: integer
        IDusuario:
          type: integer
        Fecha:
          type: string
          format: date-time
        Tipo:
          type: string
        Severidad:
          type: string
        Estado:
          type: boolean
        Leida:
          type: boolean
      example:
        ID_Alerta: 405
        ID_area: 3
        IDusuario: 1
        Fecha: "2023-11-20T10:05:00Z"
        Tipo: "Humedad Baja"
        Severidad: "Alta"
        Estado: false
        Leida: false

    AlertaInput:
      type: object
      properties:
        ID_area:
          type: integer
        IDusuario:
          type: integer
        Tipo:
          type: string
        Severidad:
          type: string
      example:
        ID_area: 3
        IDusuario: 1
        Tipo: "Humedad Baja"
        Severidad: "Alta"

    # ------------------ MedicionHistorica ------------------
    MedicionHistorica:
      type: object
      properties:
        ID_Medicion:
          type: integer
        ID_Area:
          type: integer
        Fecha:
          type: string
          format: date-time
        Temperatura_Suelo:
          type: number
          format: float
        Humedad_suelo:
          type: number
          format: float
        Evapotranspiracion:
          type: number
          format: float
        Conductividad_suelo:
          type: number
          format: float
        consumo_agua:
          type: number
          format: float
        Desarrollo_vegetativa:
          type: number
          format: float
      example:
        ID_Medicion: 9942
        ID_Area: 3
        Fecha: "2023-11-20T12:00:00Z"
        Temperatura_Suelo: 22.5
        Humedad_suelo: 18.2
        Evapotranspiracion: 4.5
        Conductividad_suelo: 1.2
        consumo_agua: 1500.0
        Desarrollo_vegetativa: 46.0

    MedicionHistoricaInput:
      type: object
      properties:
        ID_Area:
          type: integer
        Temperatura_Suelo:
          type: number
          format: float
        Humedad_suelo:
          type: number
          format: float
        Evapotranspiracion:
          type: number
          format: float
        Conductividad_suelo:
          type: number
          format: float
        consumo_agua:
          type: number
          format: float
        Desarrollo_vegetativa:
          type: number
          format: float
      example:
        ID_Area: 3
        Temperatura_Suelo: 22.5
        Humedad_suelo: 18.2
        Evapotranspiracion: 4.5
        Conductividad_suelo: 1.2
        consumo_agua: 1500.0
        Desarrollo_vegetativa: 46.0
